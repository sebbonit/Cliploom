<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Cliploom app screenshot placeholder</title>
  <desc id="desc">Replace this file with a real screenshot of the Cliploom app.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1630"/>
      <stop offset="0.55" stop-color="#2A2258"/>
      <stop offset="1" stop-color="#5742E7"/>
    </linearGradient>
    <linearGradient id="panel" x1="220" y1="160" x2="1220" y2="740" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="mark" x1="620" y1="300" x2="820" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B7AFF"/>
      <stop offset="1" stop-color="#5742E7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <circle cx="220" cy="180" r="180" fill="#8B7AFF" opacity="0.18"/>
  <circle cx="1260" cy="720" r="220" fill="#D8D2FF" opacity="0.12"/>

  <rect x="120" y="90" width="1200" height="720" rx="28" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.18"/>
  <rect x="120" y="90" width="1200" height="56" rx="28" fill="#0F0C1C" fill-opacity="0.35"/>
  <circle cx="158" cy="118" r="7" fill="#FF6B6B"/>
  <circle cx="182" cy="118" r="7" fill="#FFD166"/>
  <circle cx="206" cy="118" r="7" fill="#6BCB77"/>

  <g transform="translate(660 310)">
    <rect width="120" height="120" rx="34" fill="url(#mark)" filter="url(#soft)"/>
    <rect x="24" y="34" width="56" height="40" rx="12" fill="none" stroke="#D8D2FF" stroke-width="10"/>
    <rect x="40" y="50" width="56" height="40" rx="12" fill="none" stroke="#FFFFFF" stroke-width="10"/>
  </g>

  <text x="720" y="500" text-anchor="middle" fill="#FFFFFF" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="700">Cliploom</text>
  <text x="720" y="548" text-anchor="middle" fill="#D8D2FF" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="22">Drop your app screenshot here</text>
  <text x="720" y="590" text-anchor="middle" fill="#B7AFFF" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16">Replace docs/images/app-screenshot.svg with a PNG or JPG capture</text>
</svg>
